<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G検定 学習アプリ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f1117;--card:#1a1f2e;--card2:#222840;--border:#2a3050;
  --accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;
  --yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;--white:#fff;
}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.nav{background:#13182a;border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.nav-logo{font-size:15px;font-weight:800;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{background:none;border:none;color:var(--muted);padding:7px 11px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);background:var(--card2);}
.nav-tab.active{color:var(--accent2);background:rgba(99,102,241,.15);}

.screen{display:none;max-width:720px;margin:0 auto;padding:28px 16px 60px;}
.screen.active{display:block;}

/* HOME */
.home-hero{text-align:center;padding:32px 0 24px;}
.home-badge{display:inline-block;background:rgba(99,102,241,.15);color:var(--accent2);border:1px solid rgba(99,102,241,.3);border-radius:50px;padding:5px 14px;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:16px;}
.home-title{font-size:28px;font-weight:900;margin-bottom:10px;line-height:1.25;}
.home-title span{background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.home-sub{font-size:14px;color:var(--muted);margin-bottom:32px;line-height:1.7;}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
@media(max-width:480px){.mode-cards{grid-template-columns:1fr;}}
.mode-card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:24px 20px;cursor:pointer;transition:all .25s;text-align:left;}
.mode-card:hover{transform:translateY(-3px);}
.mode-card.text-mode:hover{border-color:var(--accent2);box-shadow:0 12px 28px rgba(99,102,241,.2);}
.mode-card.study:hover{border-color:#22c55e;box-shadow:0 12px 28px rgba(34,197,94,.15);}
.mode-card.exam:hover{border-color:#f59e0b;box-shadow:0 12px 28px rgba(245,158,11,.15);}
.mode-icon{font-size:28px;margin-bottom:12px;display:block;}
.mode-title{font-size:15px;font-weight:800;margin-bottom:6px;}
.mode-desc{font-size:12px;color:var(--muted);line-height:1.6;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
.stat-num{font-size:24px;font-weight:900;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px;}

/* TEXT SCREEN */
.text-header{margin-bottom:20px;}
.text-header h2{font-size:20px;font-weight:800;margin-bottom:4px;}
.text-header p{font-size:13px;color:var(--muted);}
.cat-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:20px;scrollbar-width:none;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{background:var(--card);border:1.5px solid var(--border);border-radius:50px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.cat-tab.active{background:rgba(99,102,241,.15);border-color:var(--accent);color:var(--accent2);}
.text-body{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px 20px;margin-bottom:16px;line-height:1.8;}
.text-body h3{font-size:15px;font-weight:800;color:var(--accent2);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.text-body h3:first-child{margin-top:0;}
.text-body p{font-size:14px;color:var(--text);margin-bottom:10px;line-height:1.8;}
.text-body ul{margin:8px 0 12px 16px;}
.text-body li{font-size:14px;color:var(--text);margin-bottom:6px;line-height:1.7;}
.kw{color:var(--accent2);font-weight:700;}
.note-box{background:rgba(99,102,241,.08);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:12px 16px;margin:12px 0;font-size:13px;color:var(--text);}
.warn-box{background:rgba(245,158,11,.08);border-left:3px solid var(--yellow);border-radius:0 10px 10px 0;padding:12px 16px;margin:12px 0;font-size:13px;color:var(--text);}
.text-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;}
.text-table th{background:var(--card2);color:var(--accent2);padding:8px 12px;text-align:left;font-weight:700;}
.text-table td{padding:8px 12px;border-top:1px solid var(--border);}
.quiz-cat-btn{width:100%;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(99,102,241,.3);}
.quiz-cat-btn:hover{transform:translateY(-2px);}

/* QUIZ */
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.quiz-meta{font-size:13px;color:var(--muted);font-weight:600;}
.quiz-progress-bar{height:5px;background:var(--card2);border-radius:50px;margin-bottom:24px;overflow:hidden;}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#a78bfa);border-radius:50px;transition:width .4s ease;}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px 20px;margin-bottom:16px;}
.q-category{display:inline-block;background:rgba(99,102,241,.12);color:var(--accent2);border-radius:50px;padding:3px 11px;font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:12px;}
.q-text{font-size:16px;font-weight:700;line-height:1.65;color:var(--white);}
.options{display:flex;flex-direction:column;gap:9px;margin-top:18px;}
.option-btn{background:var(--card2);border:1.5px solid var(--border);border-radius:13px;padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;transition:all .2s;font-weight:500;line-height:1.4;display:flex;align-items:flex-start;gap:10px;}
.option-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(99,102,241,.1);transform:translateX(3px);}
.option-btn:disabled{cursor:default;}
.option-btn.correct{border-color:var(--green)!important;background:rgba(34,197,94,.12)!important;color:var(--green);}
.option-btn.wrong{border-color:var(--red)!important;background:rgba(239,68,68,.1)!important;color:var(--red);}
.option-btn.neutral{opacity:.45;}
.opt-label{font-size:11px;font-weight:800;background:var(--border);color:var(--muted);border-radius:5px;padding:2px 6px;flex-shrink:0;margin-top:1px;}
.option-btn.correct .opt-label{background:rgba(34,197,94,.2);color:var(--green);}
.option-btn.wrong .opt-label{background:rgba(239,68,68,.15);color:var(--red);}
.explanation-box{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);border-radius:12px;padding:16px 18px;margin-top:14px;font-size:13px;line-height:1.75;}
.explanation-label{font-size:10px;font-weight:800;color:var(--accent2);letter-spacing:1px;margin-bottom:6px;}
.next-btn{width:100%;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border:none;border-radius:13px;padding:15px;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(99,102,241,.3);}
.next-btn:hover{transform:translateY(-2px);}

.timer{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:7px 14px;font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;}
.timer.warning{color:var(--yellow);border-color:var(--yellow);}
.timer.danger{color:var(--red);border-color:var(--red);animation:pulse 1s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

/* RESULT */
.result-hero{text-align:center;padding:28px 0 20px;}
.result-score-ring{width:130px;height:130px;margin:0 auto 16px;position:relative;}
.result-score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--card2);stroke-width:10;}
.ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
.result-score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0;}
.r-stat{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;text-align:center;}
.r-stat-num{font-size:22px;font-weight:900;}
.r-stat-num.green{color:var(--green);}
.r-stat-num.red{color:var(--red);}
.r-stat-num.accent{color:var(--accent2);}
.r-stat-label{font-size:11px;color:var(--muted);margin-top:3px;}
.section-title{font-size:14px;font-weight:800;color:var(--text);margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.category-result{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;}
.cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cat-name{font-size:13px;font-weight:700;}
.cat-score{font-size:12px;font-weight:700;color:var(--accent2);}
.cat-bar{height:5px;background:var(--card2);border-radius:50px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:50px;transition:width .8s ease;}
.btn-row{display:flex;gap:10px;margin-top:20px;}
.btn-outline{flex:1;background:transparent;border:1.5px solid var(--border);color:var(--text);border-radius:13px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-outline:hover{border-color:var(--accent);color:var(--accent2);}
.btn-primary{flex:1;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border:none;border-radius:13px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(99,102,241,.3);}
.btn-primary:hover{transform:translateY(-1px);}

/* PROGRESS */
.progress-overview{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
.p-card-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px;}
.p-card-val{font-size:24px;font-weight:900;}
.p-card-val.accent{color:var(--accent2);}
.p-card-val.green{color:var(--green);}
.cat-progress-item{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px 18px;margin-bottom:8px;}
.cat-p-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.cat-p-name{font-size:13px;font-weight:700;}
.cat-p-nums{font-size:11px;color:var(--muted);}
.cat-p-bar{height:4px;background:var(--card2);border-radius:50px;overflow:hidden;}
.cat-p-fill{height:100%;border-radius:50px;}
.reset-btn{background:transparent;border:1.5px solid rgba(239,68,68,.3);color:var(--red);border-radius:11px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:20px;width:100%;}
.reset-btn:hover{background:rgba(239,68,68,.08);border-color:var(--red);}

.fade-in{animation:fadeIn .32s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">G検定 学習アプリ</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showScreen('home')">🏠</button>
    <button class="nav-tab" onclick="showScreen('text')">📖 テキスト</button>
    <button class="nav-tab" onclick="showScreen('progress')">📊 進捗</button>
  </div>
</nav>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="home-hero fade-in">
    <div class="home-badge">JDLA G検定 対策</div>
    <h1 class="home-title">AIの知識を<br><span>確かめよう</span></h1>
    <p class="home-sub">全90問・7カテゴリ<br>テキスト学習 → 問題演習で合格を目指そう</p>
  </div>
  <div class="mode-cards fade-in">
    <div class="mode-card text-mode" onclick="showScreen('text')">
      <span class="mode-icon">📖</span>
      <div class="mode-title">テキスト学習</div>
      <div class="mode-desc">分野ごとの解説を読んで知識を整理してから問題を解こう</div>
    </div>
    <div class="mode-card study" onclick="startStudy(null)">
      <span class="mode-icon">✏️</span>
      <div class="mode-title">問題演習</div>
      <div class="mode-desc">全90問からランダム出題。解説付きで1問ずつ確認しながら学習</div>
    </div>
    <div class="mode-card exam" onclick="startExam()">
      <span class="mode-icon">✍️</span>
      <div class="mode-title">試験モード</div>
      <div class="mode-desc">60分・全問本番形式。実力を確認しよう</div>
    </div>
  </div>
  <div class="stats-row fade-in" id="home-stats">
    <div class="stat-box"><div class="stat-num" id="stat-attempted">0</div><div class="stat-label">解答済み問題</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-correct">0%</div><div class="stat-label">正解率</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-exams">0</div><div class="stat-label">試験受験回数</div></div>
  </div>
</div>

<!-- TEXT SCREEN -->
<div class="screen" id="screen-text">
  <div class="text-header">
    <h2>📖 テキスト学習</h2>
    <p>分野を選んで学習し、その後問題を解こう</p>
  </div>
  <div class="cat-tabs" id="text-cat-tabs"></div>
  <div id="text-body-area"></div>
</div>

<!-- STUDY -->
<div class="screen" id="screen-study">
  <div class="quiz-header">
    <div class="quiz-meta" id="study-meta">Q1 / 90</div>
    <button class="btn-outline" style="flex:none;padding:7px 12px;font-size:12px;" onclick="exitStudy()">終了</button>
  </div>
  <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="study-progress" style="width:0%"></div></div>
  <div id="study-question-area"></div>
</div>

<!-- EXAM -->
<div class="screen" id="screen-exam">
  <div class="quiz-header">
    <div class="quiz-meta" id="exam-meta">Q1 / 90</div>
    <div class="timer" id="exam-timer">60:00</div>
  </div>
  <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="exam-progress" style="width:0%"></div></div>
  <div id="exam-question-area"></div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result"><div id="result-content"></div></div>

<!-- PROGRESS -->
<div class="screen" id="screen-progress">
  <div class="text-header"><h2>📊 学習進捗</h2><p>カテゴリ別の正解率を確認できます</p></div>
  <div id="progress-content"></div>
</div>

<script>
// ===== STUDY TEXTS =====
const studyTexts = {
  "AI概論・歴史": `
<h3>AIとは</h3>
<p><span class="kw">人工知能（AI）</span>とは、人間の知的ふるまい（推論・学習・判断）をコンピュータで実現する技術の総称です。</p>
<ul>
  <li><span class="kw">弱いAI</span>：特定タスクに特化したAI（現在の技術はほぼすべてこれ）</li>
  <li><span class="kw">強いAI（汎用AI/AGI）</span>：人間と同等以上の汎用的知能を持つAI（未実現）</li>
</ul>

<h3>AIブームの歴史</h3>
<table class="text-table">
  <tr><th>時期</th><th>ブーム</th><th>キーワード</th></tr>
  <tr><td>1950〜60年代</td><td>第1次</td><td>チューリングテスト・探索・推論・ダートマス会議</td></tr>
  <tr><td>1970年代</td><td>冬の時代</td><td>限界露呈・資金停止</td></tr>
  <tr><td>1980〜90年代</td><td>第2次</td><td>エキスパートシステム・知識表現</td></tr>
  <tr><td>1990年代後半</td><td>冬の時代</td><td>知識獲得のボトルネック</td></tr>
  <tr><td>2010年代〜</td><td>第3次</td><td>深層学習・ビッグデータ・GPU</td></tr>
</table>

<h3>主要な概念</h3>
<ul>
  <li><span class="kw">チューリングテスト</span>：機械が人間と区別できない知的振る舞いをするか判定するテスト（1950年、アラン・チューリング提案）</li>
  <li><span class="kw">フレーム問題</span>：行動と無関係な事柄を無視する処理がAIにとって困難という問題</li>
  <li><span class="kw">シンボルグラウンディング問題</span>：記号と意味を結びつけることの難しさ</li>
  <li><span class="kw">シンギュラリティ</span>：AIが人間の知能を超える転換点（レイ・カーツワイルは2045年と予測）</li>
</ul>

<h3>主要人物</h3>
<ul>
  <li><span class="kw">アラン・チューリング</span>：チューリングテスト提案、計算理論の父</li>
  <li><span class="kw">ジョン・マッカーシー</span>：「AI」という言葉を提唱、ダートマス会議（1956年）主催</li>
  <li><span class="kw">ジェフリー・ヒントン</span>：深層学習の発展に貢献、「ディープラーニングの父」</li>
  <li><span class="kw">レイ・カーツワイル</span>：シンギュラリティの提唱者</li>
</ul>

<div class="note-box">💡 <strong>試験頻出：</strong>「ダートマス会議（1956年）でマッカーシーがAIという言葉を提唱」「チューリングテストの目的」「第3次AIブームのキーワードは深層学習」</div>`,

  "機械学習": `
<h3>機械学習の種類</h3>
<ul>
  <li><span class="kw">教師あり学習</span>：ラベル付きデータで学習。分類・回帰が代表タスク</li>
  <li><span class="kw">教師なし学習</span>：ラベルなしデータで構造を発見。クラスタリング・次元削減</li>
  <li><span class="kw">強化学習</span>：環境との相互作用で累積報酬を最大化するように学習</li>
</ul>

<h3>主要アルゴリズム</h3>
<table class="text-table">
  <tr><th>手法</th><th>特徴</th></tr>
  <tr><td>決定木</td><td>木構造で条件分岐。解釈しやすい</td></tr>
  <tr><td>ランダムフォレスト</td><td>複数決定木のアンサンブル。過学習に強い</td></tr>
  <tr><td>SVM</td><td>マージン最大化。サポートベクターが境界を定義</td></tr>
  <tr><td>k-NN</td><td>近傍k点の多数決で分類</td></tr>
  <tr><td>勾配ブースティング</td><td>逐次的に弱学習器を追加（XGBoost等）</td></tr>
  <tr><td>PCA</td><td>分散最大方向への次元削減</td></tr>
</table>

<h3>過学習と汎化</h3>
<ul>
  <li><span class="kw">過学習（オーバーフィッティング）</span>：訓練データに過度適合し、未知データへの性能が低下</li>
  <li><span class="kw">アンダーフィッティング</span>：モデルが単純すぎて訓練データも十分学習できていない</li>
  <li><span class="kw">正則化</span>：モデルの複雑さにペナルティ（L1/L2正則化）</li>
  <li><span class="kw">交差検証</span>：データをk分割して繰り返し評価。汎化性能を正確に測定</li>
</ul>

<h3>バイアス・バリアンストレードオフ</h3>
<ul>
  <li><span class="kw">バイアス</span>：モデルの予測値と正解の系統的なずれ（単純すぎるモデルで大きい）</li>
  <li><span class="kw">バリアンス</span>：データの変化に対するモデル出力のばらつき（複雑すぎると大きい）</li>
</ul>
<div class="note-box">💡 バイアスとバリアンスはトレードオフ関係。複雑なモデルはバリアンスが大きく（過学習しやすい）、単純なモデルはバイアスが大きい（アンダーフィット）</div>

<h3>データ前処理</h3>
<ul>
  <li><span class="kw">正規化（Min-Max）</span>：値を0〜1の範囲に変換</li>
  <li><span class="kw">標準化（Z-score）</span>：平均0・標準偏差1に変換。外れ値に強い</li>
  <li><span class="kw">次元の呪い</span>：特徴量が増えると必要なデータ量が指数的に増大する問題</li>
</ul>`,

  "ディープラーニング": `
<h3>ニューラルネットワークの基礎</h3>
<ul>
  <li><span class="kw">パーセプトロン</span>：最も単純な単層ニューラルネットワーク（1958年、ローゼンブラット）</li>
  <li><span class="kw">多層パーセプトロン（MLP）</span>：入力層・隠れ層・出力層からなる全結合ネットワーク</li>
  <li><span class="kw">誤差逆伝播法</span>：出力→入力方向に連鎖律で勾配を計算しパラメータを更新</li>
</ul>

<h3>活性化関数</h3>
<table class="text-table">
  <tr><th>関数</th><th>特徴</th></tr>
  <tr><td>Sigmoid</td><td>出力0〜1。勾配消失問題が起きやすい</td></tr>
  <tr><td>ReLU</td><td>正の値はそのまま、負は0。勾配消失を緩和。最もよく使われる</td></tr>
  <tr><td>Leaky ReLU</td><td>負の値も少し通す。Dying ReLU問題を緩和</td></tr>
  <tr><td>Softmax</td><td>出力を確率分布に変換。多クラス分類の出力層で使用</td></tr>
</table>

<h3>学習の安定化テクニック</h3>
<ul>
  <li><span class="kw">バッチ正規化</span>：各層の入力を正規化。学習を安定・高速化</li>

  <li><span class="kw">重みの初期化</span>：Xavier初期化（Sigmoid/tanh向け）、He初期化（ReLU向け）</li>
  <li><span class="kw">Adam</span>：AdaGrad+RMSpropを組み合わせた適応的学習率最適化。現在最もよく使われる</li>
</ul>

<h3>主要アーキテクチャ</h3>
<ul>
  <li><span class="kw">CNN（畳み込みニューラルネットワーク）</span>：画像認識に特化。局所的特徴抽出と位置不変性</li>

  <li><span class="kw">Transformer</span>：Self-Attention機構。並列処理可能。BERTやGPTの基盤</li>
  <li><span class="kw">GAN</span>：生成器と識別器が競い合って高品質なデータを生成</li>
  <li><span class="kw">オートエンコーダ</span>：エンコーダ+デコーダ。次元削減・異常検知に利用</li>
</ul>

<h3>転移学習・ファインチューニング</h3>

<div class="note-box">💡 <strong>試験頻出：</strong>ResNet（スキップ接続）、LSTM（長期依存）、Transformer（Self-Attention）、GAN（生成器と識別器）の仕組みをしっかり押さえよう</div>`,

  "数学・統計": `
<h3>確率・統計の基礎</h3>
<ul>
  <li><span class="kw">正規分布</span>：平均μ・標準偏差σで定まる釣り鐘型分布。68-95-99.7ルール</li>
  <li><span class="kw">ベイズ定理</span>：P(A|B) ∝ P(B|A) × P(A)。事前確率を観測データで更新</li>
  <li><span class="kw">最大尤度推定（MLE）</span>：観測データの確率（尤度）を最大化するパラメータを推定</li>
  <li><span class="kw">情報エントロピー</span>：H = -Σ p(x) log p(x)。不確実性の尺度</li>
</ul>

<h3>損失関数</h3>
<table class="text-table">
  <tr><th>損失関数</th><th>用途</th></tr>
  <tr><td>平均二乗誤差（MSE）</td><td>回帰問題</td></tr>
  <tr><td>平均絶対誤差（MAE）</td><td>回帰。外れ値に強い</td></tr>
  <tr><td>交差エントロピー</td><td>分類問題。確率的予測の評価</td></tr>
  <tr><td>ヒンジ損失</td><td>SVM</td></tr>
</table>

<h3>評価指標</h3>
<ul>
  <li><span class="kw">適合率（Precision）</span>= TP / (TP + FP)：陽性予測のうち正しい割合</li>
  <li><span class="kw">再現率（Recall）</span>= TP / (TP + FN)：実際の陽性をどれだけ検出できたか</li>
  <li><span class="kw">F値（F1）</span>= 2×Precision×Recall / (Precision+Recall)：調和平均</li>
  <li><span class="kw">AUC-ROC</span>：分類性能の指標。1.0が最高、0.5がランダム</li>
  <li><span class="kw">RMSE</span>：MSEの平方根。回帰問題の評価</li>
</ul>

<h3>最適化</h3>
<ul>
  <li><span class="kw">勾配降下法（GD）</span>：全データで勾配計算。安定だが遅い</li>

</ul>

<div class="warn-box">⚠️ 混同行列のTP/FP/TN/FNの定義と、Precision/Recall/F1の計算式は必ず覚えること</div>`,

  {id:12,category:"AI概論・歴史",question:"記号主義（シンボリックAI）の特徴として正しいものはどれですか？",options:["大量のデータから特徴を学習する","人間の知識をルールや論理として明示的に記述する","ニューロンの結合をモデル化する","データを無監督で分類する"],correct:1,explanation:"記号主義AIは知識をルール・論理・記号として明示的に表現するアプローチです。エキスパートシステムが代表例です。対照的にニューラルネットワークは連結主義です。"},

  // 機械学習
  {id:13,category:"機械学習",question:"教師あり学習の例として正しいものはどれですか？",options:["クラスタリング","主成分分析","スパムメール分類","異常検知"],correct:2,explanation:"スパムメール分類はラベル付きデータ（スパム/非スパム）を使って学習する教師あり学習の代表例です。"},
  {id:14,category:"機械学習",question:"過学習（オーバーフィッティング）とは何ですか？",options:["学習データが少なすぎて学習できない状態","訓練データに過度に適合し未知データへの汎化性能が低下した状態","モデルが複雑すぎて学習に時間がかかる状態","検証データのスコアが訓練データより高い状態"],correct:1,explanation:"過学習とは訓練データに過度に適合しすぎて、未見のデータに対する性能が低下する現象です。正則化やドロップアウトで防ぐことができます。"},
  {id:15,category:"機械学習",question:"強化学習においてエージェントが行動を選択する基準は何ですか？",options:["損失関数の最小化","累積報酬の最大化","エントロピーの最小化","データの再現率の最大化"],correct:1,explanation:"強化学習では、エージェントが環境と相互作用しながら累積報酬を最大化するように行動を学習します。"},
  {id:16,category:"機械学習",question:"ランダムフォレストの説明として正しいものはどれですか？",options:["1本の深い決定木を使う手法","複数の決定木を組み合わせるアンサンブル学習","ニューラルネットワークの一種","クラスタリング手法の一種"],correct:1,explanation:"ランダムフォレストは複数の決定木をランダムに生成して組み合わせるアンサンブル学習手法です。過学習に強く、精度が高い特徴があります。"},
  {id:17,category:"機械学習",question:"正則化の主な目的は何ですか？",options:["学習速度の向上","過学習の防止","特徴量の増加","バッチサイズの最適化"],correct:1,explanation:"正則化はモデルの複雑さにペナルティを与えることで過学習を防ぎ、汎化性能を向上させる手法です。L1正則化とL2正則化が代表的です。"},
  {id:18,category:"機械学習",question:"主成分分析（PCA）の主な用途として正しいものはどれですか？",options:["分類","次元削減","クラスタリング","回帰"],correct:1,explanation:"PCAは高次元データを低次元に圧縮する次元削減手法です。データの分散が最大となる方向（主成分）に射影します。"},
  {id:19,category:"機械学習",question:"交差検証（クロスバリデーション）の目的は何ですか？",options:["学習データを増やす","モデルの汎化性能を信頼性高く評価する","過学習を完全に防ぐ","特徴量を選択する"],correct:1,explanation:"交差検証はデータをk個に分割し繰り返し訓練・評価することでモデルの汎化性能を信頼性高く評価する手法です。"},
  {id:20,category:"機械学習",question:"SVMのサポートベクターとは何ですか？",options:["全ての訓練データ点","決定境界に最も近いデータ点","外れ値のデータ点","テストデータ点"],correct:1,explanation:"サポートベクターは決定境界（超平面）に最も近いデータ点で、SVMはこの点との距離（マージン）を最大化するように学習します。"},
  {id:21,category:"機械学習",question:"バイアスとバリアンスのトレードオフについて正しいものはどれですか？",options:["バイアスとバリアンスは同時に最小化できる","複雑なモデルほどバリアンスが大きく過学習しやすい","単純なモデルほどバリアンスが大きい","バイアスは学習率に依存する"],correct:1,explanation:"バイアス（系統的なずれ）とバリアンス（ばらつき）はトレードオフ関係にあります。複雑なモデルはバリアンスが大きく過学習しやすく、単純なモデルはバイアスが大きくなります。"},
  {id:22,category:"機械学習",question:"バギング（Bagging）とブースティング（Boosting）の違いで正しいものはどれですか？",options:["バギングは逐次的、ブースティングは並列的に学習する","バギングは並列的、ブースティングは逐次的に学習する","どちらも同じ手法","バギングは回帰、ブースティングは分類専用"],correct:1,explanation:"バギングは複数のモデルを独立（並列）に学習して多数決をとります（例：ランダムフォレスト）。ブースティングは前のモデルの誤りを次が補正するよう逐次的に学習します（例：XGBoost）。"},
  {id:23,category:"機械学習",question:"「次元の呪い」とは何ですか？",options:["モデルの次元が大きすぎて計算できない問題","特徴量の次元が増えるほど必要なデータ量が指数的に増大する問題","次元削減によって精度が下がる問題","高次元データの可視化が困難な問題"],correct:1,explanation:"次元の呪いとは特徴量の次元が増えるに従って、データ空間が急速に疎になり必要なデータ量が指数的に増大する問題です。"},
  {id:24,category:"機械学習",question:"特徴量の標準化（Standardization）の目的として正しいものはどれですか？",options:["特徴量を0〜1の範囲に収める","特徴量を平均0・標準偏差1に変換してスケールを揃える","特徴量の数を減らす","カテゴリ変数を数値に変換する"],correct:1,explanation:"標準化はZ-score正規化とも呼ばれ、各特徴量を平均0・標準偏差1に変換します。異なるスケールの特徴量を揃え、勾配降下法の収束を安定させます。"},
  {id:25,category:"機械学習",question:"ハイパーパラメータの説明として正しいものはどれですか？",options:["学習によってデータから自動的に調整されるパラメータ","学習前に人間が設定するパラメータ（学習率・木の深さ等）","モデルの重みパラメータ","バイアス項"],correct:1,explanation:"ハイパーパラメータは学習率・バッチサイズ・木の深さなど、学習前に人間が設定するパラメータです。通常のパラメータ（重み）は学習によって自動調整されます。"},
  {id:26,category:"機械学習",question:"不均衡データに対処するオーバーサンプリング手法として有名なものはどれですか？",options:["PCA","SMOTE","Dropout","Batch Normalization"],correct:1,explanation:"SMOTE（Synthetic Minority Over-sampling Technique）は少数クラスのデータを合成して増やすオーバーサンプリング手法です。不均衡データの分類問題でよく使われます。"},

  // ディープラーニング
  {id:27,category:"ディープラーニング",question:"活性化関数を使う主な理由は何ですか？",options:["学習速度を上げるため","ネットワークに非線形性を導入するため","パラメータ数を減らすため","データを正規化するため"],correct:1,explanation:"活性化関数がなければニューラルネットワークは線形変換の繰り返しになり、表現力が制限されます。ReLUやSigmoidなどの非線形関数を使うことで複雑なパターンを学習できます。"},
  {id:28,category:"ディープラーニング",question:"ReLUの動作として正しいものはどれですか？",options:["全ての入力を0〜1に変換する","負の入力を0にし正の入力はそのまま出力する","入力の符号を反転する","入力を対数変換する"],correct:1,explanation:"ReLUはf(x)=max(0,x)で定義され、正の値はそのまま、負の値は0を出力します。計算が単純で勾配消失問題を緩和するため広く使われています。"},
  {id:29,category:"ディープラーニング",question:"誤差逆伝播法（バックプロパゲーション）とは何ですか？",options:["出力から入力方向に誤差の勾配を伝播させてパラメータを更新する手法","入力から出力方向にデータを伝播させる手法","ランダムにパラメータを更新する手法","データを逆順に入力する手法"],correct:0,explanation:"誤差逆伝播法は出力層から入力層方向に連鎖律を使って勾配を計算し、各層のパラメータを更新するアルゴリズムです。"},
  {id:30,category:"ディープラーニング",question:"勾配消失問題が起きやすい活性化関数はどれですか？",options:["ReLU","Sigmoid","Leaky ReLU","ELU"],correct:1,explanation:"Sigmoid関数は出力が0〜1の範囲に収まるため、深い層では勾配が非常に小さくなり重みがほとんど更新されない勾配消失問題が起きやすいです。"},
  {id:31,category:"ディープラーニング",question:"ドロップアウト（Dropout）の主な目的は何ですか？",options:["学習速度を上げる","過学習を防ぐ","勾配消失を解決する","バッチサイズを最適化する"],correct:1,explanation:"ドロップアウトは学習時にランダムにニューロンを無効化する正則化手法です。ネットワークが特定のニューロンに依存しないように学習され、過学習を防ぎます。"},
  {id:32,category:"ディープラーニング",question:"バッチ正規化（Batch Normalization）の効果として正しいものはどれですか？",options:["データをランダムにシャッフルする","各層の入力を正規化して学習を安定・高速化する","バッチサイズを自動調整する","過学習を完全に防ぐ"],correct:1,explanation:"バッチ正規化はミニバッチ単位で各層の入力を正規化する手法で、学習の安定化・高速化、勾配消失の緩和に効果があります。"},
  {id:33,category:"ディープラーニング",question:"CNNが画像認識に適している理由はどれですか？",options:["パラメータ数が多いから","位置不変性と局所的な特徴抽出が得意だから","系列データを扱えるから","強化学習に特化しているから"],correct:1,explanation:"CNNは畳み込み層とプーリング層により、画像の局所的な特徴を抽出しつつ位置不変性を持つため、画像認識タスクに非常に適しています。"},
  {id:34,category:"ディープラーニング",question:"LSTMが解決しようとした問題は何ですか？",options:["画像認識の精度向上","RNNの長期依存関係の学習困難（勾配消失）","計算速度の向上","データの次元削減"],correct:1,explanation:"LSTMはゲート機構（入力・忘却・出力ゲート）によって、通常のRNNでは困難だった長期依存関係の学習と勾配消失問題を解決します。"},
  {id:35,category:"ディープラーニング",question:"GANの基本的な仕組みはどれですか？",options:["教師データを使って分類器を学習する","生成器と識別器が競い合うことでリアルなデータを生成する","複数のネットワークの予測を平均する","強化学習で最適な生成戦略を学ぶ"],correct:1,explanation:"GANは本物のデータを生成しようとする生成器と、本物か偽物かを見分ける識別器が敵対的に競い合うことで、リアルなデータを生成できるようになります。"},
  {id:36,category:"ディープラーニング",question:"転移学習（Transfer Learning）とは何ですか？",options:["データを別のフォーマットに変換する","あるタスクで学習したモデルの知識を別のタスクに流用する","モデルを別のハードウェアに移す","学習データを他のモデルに転送する"],correct:1,explanation:"転移学習は大量のデータで事前学習したモデルを、少量のデータしかない別タスクに適用する手法です。学習コストの削減と性能向上が期待できます。"},
  {id:37,category:"ディープラーニング",question:"TransformerのSelf-Attention機構とは何ですか？",options:["自分自身のデータだけを使って学習する機構","系列内の各要素が互いにどれだけ関連するかの重みを計算する機構","再帰的に情報を伝播させる機構","画像をパッチに分割する機構"],correct:1,explanation:"Self-Attentionは系列内のすべての位置間の関連度（注意重み）を計算し、文脈を踏まえた表現を生成します。Transformerの中核技術です。"},
  {id:38,category:"ディープラーニング",question:"ResNetで導入された技術は何ですか？",options:["ドロップアウト","スキップ接続（残差接続）","バッチ正規化","Self-Attention"],correct:1,explanation:"ResNetはスキップ接続（残差接続）により、勾配が直接前の層に伝わる経路を設けることで、100層以上の深いネットワークでも安定して学習できます。"},
  {id:39,category:"ディープラーニング",question:"Adam最適化アルゴリズムの特徴として正しいものはどれですか？",options:["全データで一度だけ勾配を計算する","各パラメータに適応的な学習率を適用するモメンタムベースの手法","勾配を使わずにランダム探索する","L2正則化と同じ効果を持つ"],correct:1,explanation:"Adamは各パラメータに対して適応的な学習率を適用する手法で、AdaGradとRMSpropのアイデアを組み合わせています。現在最もよく使われる最適化アルゴリズムです。"},
  {id:40,category:"ディープラーニング",question:"知識蒸留（Knowledge Distillation）とは何ですか？",options:["データを圧縮する手法","大きなモデルの知識を小さなモデルに移転する手法","画像からテキストを生成する手法","複数のモデルを統合する手法"],correct:1,explanation:"知識蒸留は、精度の高い大きなモデル（教師）の出力を使って、軽量な小さなモデル（生徒）を学習させる手法です。モデルの軽量化に有効です。"},
  {id:41,category:"ディープラーニング",question:"GPUがディープラーニングに適している主な理由はどれですか？",options:["消費電力が少ないため","大量の行列演算を並列に処理できるため","メモリ容量がCPUより大きいため","プログラムのデバッグが容易なため"],correct:1,explanation:"ディープラーニングの学習は主に大量の行列演算（積・加算）で構成されており、GPUは数千のコアによる並列計算がこれらに非常に適しています。"},

  // 自然言語処理
  {id:42,category:"自然言語処理",question:"Word2Vecの説明として正しいものはどれですか？",options:["単語を画像として表現する手法","単語を密なベクトル空間に埋め込む手法","文書を要約する手法","文法エラーを修正する手法"],correct:1,explanation:"Word2Vecは単語を低次元の密なベクトルで表現する手法で、意味的に近い単語が近いベクトルになります。「king - man + woman ≈ queen」のような演算が可能です。"},
  {id:43,category:"自然言語処理",question:"BERTの特徴として正しいものはどれですか？",options:["左から右方向のみの単方向モデル","双方向のTransformerを使った事前学習モデル","画像認識に特化したモデル","強化学習で学習したモデル"],correct:1,explanation:"BERTはGoogleが開発した双方向Transformerモデルで、文章の前後両方の文脈を考慮して学習します。マスク言語モデルと次文予測タスクで事前学習されます。"},
  {id:44,category:"自然言語処理",question:"形態素解析とは何ですか？",options:["文章の感情を分析する","文章を意味の最小単位（形態素）に分割する","文章を翻訳する","文章の類似度を計算する"],correct:1,explanation:"形態素解析は文章を意味を持つ最小単位（形態素）に分割し、品詞情報などを付与する処理です。日本語NLPの前処理として重要で、MeCabなどのツールが使われます。"},
  {id:45,category:"自然言語処理",question:"TF-IDFが表すものはどれですか？",options:["単語の発音の難しさ","文書内での単語の重要度","単語の感情値","文書の長さ"],correct:1,explanation:"TF-IDFはTF（文書内での単語頻度）とIDF（単語が出現する文書の少なさ）を掛け合わせ、その文書での単語の重要度を表す指標です。"},
  {id:46,category:"自然言語処理",question:"大規模言語モデル（LLM）の説明として正しいものはどれですか？",options:["少量のデータで学習した小さなモデル","膨大なテキストデータで事前学習された大規模なTransformerモデル","画像と言語を組み合わせたモデル","音声認識専用のモデル"],correct:1,explanation:"LLMはGPT-4やClaudeなどに代表される、膨大なテキストデータで事前学習された大規模なTransformerモデルです。文章生成・要約・翻訳など多様なタスクをこなします。"},
  {id:47,category:"自然言語処理",question:"RAG（Retrieval Augmented Generation）とは何ですか？",options:["音声を文字に変換する手法","外部知識ベースを検索してLLMの回答に組み込む手法","テキストを画像に変換する手法","文章を複数言語に翻訳する手法"],correct:1,explanation:"RAGは外部の知識ベースやデータベースから関連情報を検索し、その情報をLLMのプロンプトに組み込んで精度の高い回答を生成する手法です。"},
  {id:48,category:"自然言語処理",question:"固有表現認識（NER）とは何ですか？",options:["文の主語を特定する","テキスト中の人名・地名・組織名などを識別するタスク","感情のポジネガを判定する","文の構造を解析する"],correct:1,explanation:"固有表現認識（Named Entity Recognition）はテキスト中の人名・地名・組織名・日付などのエンティティを識別するNLPの基本タスクです。"},
  {id:49,category:"自然言語処理",question:"サブワード分割（BPEなど）を使う主な理由はどれですか？",options:["文章を短くするため","未知語問題を緩和するため","文法ミスを修正するため","文章を翻訳しやすくするため"],correct:1,explanation:"BPE（Byte Pair Encoding）などのサブワード分割は、単語をより小さな単位に分割することで、未知語（学習時に見たことない単語）の問題を緩和し、語彙サイズを管理可能にします。"},
  {id:50,category:"自然言語処理",question:"Attention機構の役割として正しいものはどれですか？",options:["画像のピクセルを注目する機構","系列の各要素がどの部分に注目すべきかの重みを計算する機構","モデルの計算を省略する機構","データを圧縮する機構"],correct:1,explanation:"Attention機構は入力系列の各位置に対して重要度（注意重み）を動的に計算します。これによりモデルは文脈に応じて重要な情報に集中できます。"},

  // 画像認識
  {id:51,category:"画像認識",question:"2012年のImageNet競技会で深層学習の優位性を示したモデルはどれですか？",options:["VGGNet","AlexNet","ResNet","GoogLeNet"],correct:1,explanation:"2012年にAlexNetがImageNet Large Scale Visual Recognition Challengeで圧倒的な精度で優勝し、深層学習の優位性を世界に示しました。"},
  {id:52,category:"画像認識",question:"データ拡張（Data Augmentation）の目的として正しいものはどれですか？",options:["モデルのパラメータ数を増やす","訓練データを人工的に増やして汎化性能を向上させる","テストデータを増やす","学習速度を上げる"],correct:1,explanation:"データ拡張は画像の回転・反転・クロッピングなどの変換を加えることで訓練データを増やし、過学習を防いで汎化性能を向上させる技術です。"},
  {id:53,category:"画像認識",question:"セマンティックセグメンテーションとは何ですか？",options:["画像を複数の小さな画像に分割する","画像の各ピクセルにクラスラベルを割り当てる","画像内の物体の個数を数える","画像のノイズを除去する"],correct:1,explanation:"セマンティックセグメンテーションは画像の各ピクセルにクラスラベルを付与する手法で、自動運転での道路・歩行者の識別などに使われます。"},

// ===== STATE =====
let state = { mode:null, currentIndex:0, studyOrder:[], examOrder:[], answers:[], timerInterval:null, timeLeft:3600, examDone:false, currentCat:null };

// ===== STORAGE =====
const STORAGE_KEY='g_kentei_prog', EXAM_KEY='g_kentei_exams';
function loadProg(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; }catch{ return {}; } }
function saveProg(d){ localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); }
function loadExams(){ return parseInt(localStorage.getItem(EXAM_KEY)||'0'); }
function saveExams(n){ localStorage.setItem(EXAM_KEY,String(n)); }

// ===== NAV =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  if(id==='home'){ document.querySelectorAll('.nav-tab')[0].classList.add('active'); updateHomeStats(); }
  if(id==='text'){ document.querySelectorAll('.nav-tab')[1].classList.add('active'); renderTextScreen(); }
  if(id==='progress'){ document.querySelectorAll('.nav-tab')[2].classList.add('active'); renderProgress(); }
}

// ===== HOME STATS =====
function updateHomeStats(){
  const prog=loadProg(); const ids=Object.keys(prog);
  let tc=0, ta=0;
  ids.forEach(id=>{ tc+=prog[id].correct||0; ta+=(prog[id].correct||0)+(prog[id].wrong||0); });
  const rate=ta>0?Math.round(tc/ta*100):0;
  document.getElementById('stat-attempted').textContent=ids.length;
  document.getElementById('stat-correct').textContent=rate+'%';
  document.getElementById('stat-exams').textContent=loadExams();
}

// ===== TEXT SCREEN =====
const cats = [...new Set(questions.map(q=>q.category))];
let currentCat = cats[0];

function renderTextScreen(){
  const tabsEl = document.getElementById('text-cat-tabs');
  tabsEl.innerHTML = cats.map(c=>`<button class="cat-tab ${c===currentCat?'active':''}" onclick="selectTextCat('${c}')">${c}</button>`).join('');
  renderTextBody();
}
function selectTextCat(cat){
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach((t,i)=>{
    t.classList.toggle('active', cats[i]===cat);
  });
  renderTextBody();
}
function renderTextBody(){
  const catQs = questions.filter(q=>q.category===currentCat);
  document.getElementById('text-body-area').innerHTML = `
    <div class="text-body fade-in">${studyTexts[currentCat]||'準備中です。'}</div>
    <button class="quiz-cat-btn fade-in" onclick="startStudy('${currentCat}')">
      ✏️ 「${currentCat}」の問題を解く（${catQs.length}問）
    </button>`;
}

// ===== STUDY =====
function startStudy(cat){
  state.mode='study';
  const pool = cat ? questions.filter(q=>q.category===cat) : questions;
  state.studyOrder = shuffle([...pool]);
  state.currentIndex = 0;
  state.currentCat = cat;
  showScreen('study');
  renderStudyQ();
}
function exitStudy(){ showScreen('home'); }
function renderStudyQ(){
  const q=state.studyOrder[state.currentIndex];
  const total=state.studyOrder.length;
  document.getElementById('study-meta').textContent=`Q${state.currentIndex+1} / ${total}`;
  document.getElementById('study-progress').style.width=((state.currentIndex/total)*100)+'%';
  const L=['A','B','C','D'];
  document.getElementById('study-question-area').innerHTML=`
    <div class="question-card fade-in">
      <div class="q-category">${q.category}</div>
      <div class="q-text">${q.question}</div>
      <div class="options" id="s-opts">
        ${q.options.map((o,i)=>`<button class="option-btn" id="s-opt-${i}" onclick="studyAns(${i})"><span class="opt-label">${L[i]}</span>${o}</button>`).join('')}
      </div>
      <div id="s-expl" style="display:none;"></div>
    </div>
    <div id="s-next"></div>`;
}
function studyAns(sel){
  const q=state.studyOrder[state.currentIndex];
  const ok=sel===q.correct;
  const prog=loadProg();
  if(!prog[q.id]) prog[q.id]={correct:0,wrong:0};
  if(ok) prog[q.id].correct++; else prog[q.id].wrong++;
  saveProg(prog);
  ['A','B','C','D'].forEach((_,i)=>{
    const b=document.getElementById('s-opt-'+i);
    b.disabled=true;
    if(i===q.correct) b.classList.add('correct');
    else if(i===sel&&!ok) b.classList.add('wrong');
    else b.classList.add('neutral');
  });
  const ex=document.getElementById('s-expl');
  ex.style.display='block';
  ex.className='explanation-box fade-in';
  ex.innerHTML=`<div class="explanation-label">💡 解説</div>${q.explanation}`;
  const isLast=state.currentIndex>=state.studyOrder.length-1;
  document.getElementById('s-next').innerHTML=`<button class="next-btn fade-in" onclick="${isLast?'exitStudy()':'nextStudyQ()'}">${isLast?'🏠 ホームへ':'次の問題へ →'}</button>`;
}
function nextStudyQ(){ state.currentIndex++; renderStudyQ(); }

// ===== EXAM =====
function startExam(){
  state.mode='exam'; state.examOrder=shuffle([...questions]);
  state.currentIndex=0; state.answers=[]; state.timeLeft=3600; state.examDone=false;
  showScreen('exam'); startTimer(); renderExamQ();
}
function startTimer(){
  if(state.timerInterval) clearInterval(state.timerInterval);
  updateTimer();
  state.timerInterval=setInterval(()=>{ state.timeLeft--; updateTimer(); if(state.timeLeft<=0){ clearInterval(state.timerInterval); finishExam(); }},1000);
}
function updateTimer(){
  const el=document.getElementById('exam-timer'); if(!el) return;
  const m=Math.floor(state.timeLeft/60).toString().padStart(2,'0');
  const s=(state.timeLeft%60).toString().padStart(2,'0');
  el.textContent=`${m}:${s}`;
  el.className='timer'+(state.timeLeft<300?' danger':state.timeLeft<600?' warning':'');
}
function renderExamQ(){
  const q=state.examOrder[state.currentIndex];
  const total=state.examOrder.length;
  document.getElementById('exam-meta').textContent=`Q${state.currentIndex+1} / ${total}`;
  document.getElementById('exam-progress').style.width=((state.currentIndex/total)*100)+'%';
  const L=['A','B','C','D'];
  document.getElementById('exam-question-area').innerHTML=`
    <div class="question-card fade-in">
      <div class="q-category">${q.category}</div>
      <div class="q-text">${q.question}</div>
      <div class="options">
        ${q.options.map((o,i)=>`<button class="option-btn" onclick="examAns(${i})"><span class="opt-label">${L[i]}</span>${o}</button>`).join('')}
      </div>
    </div>`;
}
function examAns(sel){
  const q=state.examOrder[state.currentIndex];
  const ok=sel===q.correct;
  state.answers.push({questionId:q.id,selected:sel,correct:q.correct,isCorrect:ok,category:q.category});
  const prog=loadProg();
  if(!prog[q.id]) prog[q.id]={correct:0,wrong:0};
  if(ok) prog[q.id].correct++; else prog[q.id].wrong++;
  saveProg(prog);
  state.currentIndex++;
  if(state.currentIndex>=state.examOrder.length) finishExam(); else renderExamQ();
}
function finishExam(){
  if(state.examDone) return; state.examDone=true;
  if(state.timerInterval) clearInterval(state.timerInterval);
  saveExams(loadExams()+1);
  showScreen('result'); renderResult();
}

// ===== RESULT =====
function renderResult(){
  const ans=state.answers, total=state.examOrder.length;
  const correct=ans.filter(a=>a.isCorrect).length;
  const wrong=ans.length-correct, skipped=total-ans.length;
  const score=Math.round(correct/total*100);
  const C=2*Math.PI*54;
  const sc=score>=70?'#22c55e':score>=50?'#f59e0b':'#ef4444';
  const cats2={};
  state.examOrder.forEach(q=>{ if(!cats2[q.category]) cats2[q.category]={total:0,correct:0}; cats2[q.category].total++; });
  ans.forEach(a=>{ if(a.isCorrect) cats2[a.category].correct++; });
  const catHTML=Object.entries(cats2).map(([n,d])=>{
    const r=d.total>0?Math.round(d.correct/d.total*100):0;
    const c=r>=70?'#22c55e':r>=50?'#f59e0b':'#ef4444';
    return `<div class="category-result"><div class="cat-header"><div class="cat-name">${n}</div><div class="cat-score">${d.correct}/${d.total} (${r}%)</div></div><div class="cat-bar"><div class="cat-bar-fill" style="width:${r}%;background:${c};"></div></div></div>`;
  }).join('');
  const msg=score>=70?'🎉 合格圏内！':score>=50?'📚 もう少し！復習しよう':'💪 基礎から復習しよう';
  document.getElementById('result-content').innerHTML=`
    <div class="result-hero fade-in">
      <div class="result-score-ring">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle class="ring-bg" cx="65" cy="65" r="54"/>
          <circle class="ring-fill" cx="65" cy="65" r="54" stroke="${sc}" stroke-dasharray="${C}" stroke-dashoffset="${C*(1-score/100)}"/>
        </svg>
        <div class="result-score-num">${score}<span style="font-size:13px;color:var(--muted);">%</span></div>
      </div>
      <div style="font-size:18px;font-weight:800;margin-bottom:6px;">${msg}</div>
      <div style="font-size:13px;color:var(--muted);">経過時間: ${fmt(3600-state.timeLeft)}</div>
    </div>
    <div class="result-stats fade-in">
      <div class="r-stat"><div class="r-stat-num green">${correct}</div><div class="r-stat-label">正解</div></div>
      <div class="r-stat"><div class="r-stat-num red">${wrong}</div><div class="r-stat-label">不正解</div></div>
      <div class="r-stat"><div class="r-stat-num accent">${skipped}</div><div class="r-stat-label">未回答</div></div>
    </div>
    <div class="section-title">カテゴリ別 正解率</div>
    ${catHTML}
    <div class="btn-row">
      <button class="btn-outline" onclick="startExam()">🔄 もう一度</button>
      <button class="btn-primary" onclick="showScreen('home')">🏠 ホームへ</button>
    </div>`;
}

// ===== PROGRESS =====
function renderProgress(){
  const prog=loadProg();
  let tc=0,ta=0;
  const catData={};
  questions.forEach(q=>{ if(!catData[q.category]) catData[q.category]={total:0,correct:0,wrong:0}; catData[q.category].total++; const p=prog[q.id]; if(p){ catData[q.category].correct+=p.correct||0; catData[q.category].wrong+=p.wrong||0; tc+=p.correct||0; ta+=(p.correct||0)+(p.wrong||0); } });
  const rate=ta>0?Math.round(tc/ta*100):0;
  const catHTML=Object.entries(catData).map(([n,d])=>{
    const att=d.correct+d.wrong, r=att>0?Math.round(d.correct/att*100):0;
    const c=r>=70?'#22c55e':r>=50?'#f59e0b':'#ef4444';
    return `<div class="cat-progress-item"><div class="cat-p-header"><div class="cat-p-name">${n}</div><div class="cat-p-nums">${d.correct}正解 / ${att}回答 (${r}%)</div></div><div class="cat-p-bar"><div class="cat-p-fill" style="width:${r}%;background:${c};"></div></div></div>`;
  }).join('');
  document.getElementById('progress-content').innerHTML=`
    <div class="progress-overview fade-in">
      <div class="p-card"><div class="p-card-label">総合正解率</div><div class="p-card-val accent">${rate}%</div></div>
      <div class="p-card"><div class="p-card-label">総回答数</div><div class="p-card-val green">${ta}</div></div>
    </div>
    <div class="section-title">カテゴリ別 正解率</div>
    ${catHTML}
    <button class="reset-btn" onclick="if(confirm('進捗をリセットしますか？')){localStorage.removeItem('${STORAGE_KEY}');localStorage.removeItem('${EXAM_KEY}');renderProgress();updateHomeStats();}">🗑️ 進捗をリセット</button>`;
}

// ===== UTILS =====
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }
function fmt(s){ return `${Math.floor(s/60)}分${s%60}秒`; }

updateHomeStats();
</script>
