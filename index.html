<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G検定 学習アプリ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f1117;--card:#1a1f2e;--card2:#222840;--border:#2a3050;
  --accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;
  --yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;--white:#fff;
}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ===== NAV ===== */
.nav{background:#13182a;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.nav-logo{font-size:16px;font-weight:800;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{background:none;border:none;color:var(--muted);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.nav-tab:hover{color:var(--text);background:var(--card2);}
.nav-tab.active{color:var(--accent2);background:rgba(99,102,241,.15);}

/* ===== SCREENS ===== */
.screen{display:none;max-width:720px;margin:0 auto;padding:32px 20px;}
.screen.active{display:block;}

/* ===== HOME ===== */
.home-hero{text-align:center;padding:40px 0 32px;}
.home-badge{display:inline-block;background:rgba(99,102,241,.15);color:var(--accent2);border:1px solid rgba(99,102,241,.3);border-radius:50px;padding:6px 16px;font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:20px;}
.home-title{font-size:32px;font-weight:900;margin-bottom:12px;line-height:1.2;}
.home-title span{background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.home-sub{font-size:15px;color:var(--muted);margin-bottom:40px;line-height:1.7;}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px;}
.mode-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:28px 24px;cursor:pointer;transition:all .25s;text-align:left;}
.mode-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 12px 32px rgba(99,102,241,.2);}
.mode-icon{font-size:32px;margin-bottom:16px;display:block;}
.mode-title{font-size:17px;font-weight:800;margin-bottom:8px;}
.mode-desc{font-size:13px;color:var(--muted);line-height:1.6;}
.mode-card.study:hover{border-color:#22c55e;box-shadow:0 12px 32px rgba(34,197,94,.15);}
.mode-card.exam:hover{border-color:#f59e0b;box-shadow:0 12px 32px rgba(245,158,11,.15);}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;}
.stat-num{font-size:28px;font-weight:900;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px;}

/* ===== QUIZ COMMON ===== */
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.quiz-meta{font-size:13px;color:var(--muted);font-weight:600;}
.quiz-progress-bar{height:6px;background:var(--card2);border-radius:50px;margin-bottom:28px;overflow:hidden;}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#a78bfa);border-radius:50px;transition:width .4s ease;}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;margin-bottom:20px;}
.q-category{display:inline-block;background:rgba(99,102,241,.12);color:var(--accent2);border-radius:50px;padding:4px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:14px;}
.q-text{font-size:17px;font-weight:700;line-height:1.65;color:var(--white);}
.options{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.option-btn{background:var(--card2);border:1.5px solid var(--border);border-radius:14px;padding:15px 18px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;transition:all .2s;font-weight:500;line-height:1.45;display:flex;align-items:flex-start;gap:12px;}
.option-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(99,102,241,.1);transform:translateX(4px);}
.option-btn:disabled{cursor:default;}
.option-btn.correct{border-color:var(--green)!important;background:rgba(34,197,94,.12)!important;color:var(--green);}
.option-btn.wrong{border-color:var(--red)!important;background:rgba(239,68,68,.1)!important;color:var(--red);}
.option-btn.neutral{opacity:.5;}
.opt-label{font-size:12px;font-weight:800;background:var(--border);color:var(--muted);border-radius:6px;padding:2px 7px;flex-shrink:0;margin-top:1px;}
.option-btn.correct .opt-label{background:rgba(34,197,94,.2);color:var(--green);}
.option-btn.wrong .opt-label{background:rgba(239,68,68,.15);color:var(--red);}
.explanation-box{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);border-radius:14px;padding:18px 20px;margin-top:16px;font-size:14px;line-height:1.75;color:var(--text);}
.explanation-label{font-size:11px;font-weight:800;color:var(--accent2);letter-spacing:1px;margin-bottom:8px;}
.next-btn{width:100%;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(99,102,241,.35);}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.45);}

/* ===== TIMER ===== */
.timer{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:8px 16px;font-size:14px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;}
.timer.warning{color:var(--yellow);border-color:var(--yellow);}
.timer.danger{color:var(--red);border-color:var(--red);animation:pulse 1s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

/* ===== RESULT ===== */
.result-hero{text-align:center;padding:32px 0 24px;}
.result-score-ring{width:140px;height:140px;margin:0 auto 20px;position:relative;}
.result-score-ring svg{transform:rotate(-90deg);}
.result-score-ring .ring-bg{fill:none;stroke:var(--card2);stroke-width:10;}
.result-score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
.result-score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:900;}
.result-title{font-size:22px;font-weight:800;margin-bottom:8px;}
.result-sub{font-size:14px;color:var(--muted);}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:24px 0;}
.r-stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
.r-stat-num{font-size:24px;font-weight:900;}
.r-stat-num.green{color:var(--green);}
.r-stat-num.red{color:var(--red);}
.r-stat-num.accent{color:var(--accent2);}
.r-stat-label{font-size:11px;color:var(--muted);margin-top:4px;}
.category-result{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;}
.cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cat-name{font-size:14px;font-weight:700;}
.cat-score{font-size:13px;font-weight:700;color:var(--accent2);}
.cat-bar{height:6px;background:var(--card2);border-radius:50px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:50px;transition:width .8s ease;}
.btn-row{display:flex;gap:12px;margin-top:24px;}
.btn-outline{flex:1;background:transparent;border:1.5px solid var(--border);color:var(--text);border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-outline:hover{border-color:var(--accent);color:var(--accent2);}
.btn-primary{flex:1;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(99,102,241,.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.4);}

/* ===== PROGRESS SCREEN ===== */
.progress-header{margin-bottom:28px;}
.progress-title{font-size:22px;font-weight:800;margin-bottom:6px;}
.progress-sub{font-size:14px;color:var(--muted);}
.progress-overview{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px;}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;}
.p-card-label{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px;}
.p-card-val{font-size:26px;font-weight:900;}
.p-card-val.accent{color:var(--accent2);}
.p-card-val.green{color:var(--green);}
.section-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.cat-progress-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:10px;}
.cat-p-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cat-p-name{font-size:14px;font-weight:700;}
.cat-p-nums{font-size:12px;color:var(--muted);}
.cat-p-bar{height:5px;background:var(--card2);border-radius:50px;overflow:hidden;}
.cat-p-fill{height:100%;border-radius:50px;}
.reset-btn{background:transparent;border:1.5px solid rgba(239,68,68,.3);color:var(--red);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:24px;width:100%;}
.reset-btn:hover{background:rgba(239,68,68,.08);border-color:var(--red);}

/* ===== FADE ===== */
.fade-in{animation:fadeIn .35s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ===== RESPONSIVE ===== */
@media(max-width:480px){
  .mode-cards{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:repeat(3,1fr);}
  .home-title{font-size:26px;}
  .nav-tab span{display:none;}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">G検定 学習アプリ</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showScreen('home')">🏠 <span>ホーム</span></button>
    <button class="nav-tab" onclick="showScreen('progress')">📊 <span>進捗</span></button>
  </div>
</nav>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="home-hero fade-in">
    <div class="home-badge">JDLA G検定 対策</div>
    <h1 class="home-title">AIの知識を<br><span>確かめよう</span></h1>
    <p class="home-sub">全50問・7カテゴリで<br>G検定合格を目指そう</p>
  </div>

  <div class="mode-cards fade-in">
    <div class="mode-card study" onclick="startStudy()">
      <span class="mode-icon">📖</span>
      <div class="mode-title">学習モード</div>
      <div class="mode-desc">回答後に解説を確認しながら1問ずつ学習できます</div>
    </div>
    <div class="mode-card exam" onclick="startExam()">
      <span class="mode-icon">✍️</span>
      <div class="mode-title">試験モード</div>
      <div class="mode-desc">60分の制限時間で全50問に挑戦。本番形式で実力を確認</div>
    </div>
  </div>

  <div class="stats-row fade-in" id="home-stats">
    <div class="stat-box">
      <div class="stat-num" id="stat-attempted">0</div>
      <div class="stat-label">解答済み問題</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-correct">0%</div>
      <div class="stat-label">正解率</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-exams">0</div>
      <div class="stat-label">試験受験回数</div>
    </div>
  </div>
</div>

<!-- STUDY MODE -->
<div class="screen" id="screen-study">
  <div class="quiz-header">
    <div class="quiz-meta" id="study-meta">Q1 / 50</div>
    <button class="btn-outline" style="flex:none;padding:8px 14px;font-size:13px;" onclick="exitStudy()">終了</button>
  </div>
  <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="study-progress" style="width:0%"></div></div>
  <div id="study-question-area"></div>
</div>

<!-- EXAM MODE -->
<div class="screen" id="screen-exam">
  <div class="quiz-header">
    <div class="quiz-meta" id="exam-meta">Q1 / 50</div>
    <div class="timer" id="exam-timer">60:00</div>
  </div>
  <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="exam-progress" style="width:0%"></div></div>
  <div id="exam-question-area"></div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div id="result-content"></div>
</div>

<!-- PROGRESS -->
<div class="screen" id="screen-progress">
  <div class="progress-header">
    <div class="progress-title">📊 学習進捗</div>
    <div class="progress-sub">カテゴリ別の正解率を確認できます</div>
  </div>
  <div id="progress-content"></div>
</div>

<script>
// ===== QUESTIONS =====
const questions = [
  // AI概論・歴史
  {id:1,category:"AI概論・歴史",question:"「人工知能（Artificial Intelligence）」という言葉を初めて提唱した人物は誰ですか？",options:["アラン・チューリング","ジョン・マッカーシー","マービン・ミンスキー","クロード・シャノン"],correct:1,explanation:"1956年のダートマス会議においてジョン・マッカーシーが「人工知能」という言葉を提唱しました。"},
  {id:2,category:"AI概論・歴史",question:"深層学習（ディープラーニング）が大きく注目されたのは第何次AIブームですか？",options:["第1次","第2次","第3次","第4次"],correct:2,explanation:"2010年代に始まった第3次AIブームでは、ビッグデータとGPUの進化により深層学習が急速に発展しました。"},
  {id:3,category:"AI概論・歴史",question:"チューリングテストの目的として正しいものはどれですか？",options:["コンピュータの処理速度を測定する","機械が人間と区別できない知的振る舞いをするかを判定する","プログラムのバグを自動検出する","AIが自己学習できるかを検証する"],correct:1,explanation:"チューリングテストはアラン・チューリングが1950年に提案した、機械が人間と区別できない知的振る舞いをするかを判定するテストです。"},
  {id:4,category:"AI概論・歴史",question:"第2次AIブームで主に発展した技術はどれですか？",options:["深層学習","エキスパートシステム","強化学習","自然言語処理"],correct:1,explanation:"第2次AIブーム（1980年代）ではエキスパートシステムが注目されました。専門家の知識をルールベースで表現するシステムです。"},
  {id:5,category:"AI概論・歴史",question:"「シンギュラリティ（技術的特異点）」を提唱した人物は誰ですか？",options:["イーロン・マスク","レイ・カーツワイル","スティーブン・ホーキング","ジェフリー・ヒントン"],correct:1,explanation:"レイ・カーツワイルはAIが人間の知能を超える転換点「シンギュラリティ」が2045年に到来すると予測しました。"},
  {id:6,category:"AI概論・歴史",question:"AIにおける「フレーム問題」とは何ですか？",options:["画像の枠（フレーム）を認識する問題","行動の影響しない事柄を無視する処理が困難であるという問題","アニメのフレームを生成する問題","データのフレームを統一する問題"],correct:1,explanation:"フレーム問題とは、ある行動がもたらす変化と無関係な事柄を効率よく無視することがAIにとって非常に困難であるという問題です。"},
  {id:7,category:"AI概論・歴史",question:"ダートマス会議が開催された年はいつですか？",options:["1943年","1950年","1956年","1969年"],correct:2,explanation:"1956年にダートマス大学で開催されたダートマス会議でAIという言葉が生まれ、AI研究の出発点となりました。"},

  // 機械学習
  {id:8,category:"機械学習",question:"教師あり学習の例として正しいものはどれですか？",options:["クラスタリング","主成分分析","スパムメール分類","異常検知"],correct:2,explanation:"スパムメール分類はラベル付きデータ（スパム/非スパム）を使って学習する教師あり学習の代表例です。"},
  {id:9,category:"機械学習",question:"過学習（オーバーフィッティング）とは何ですか？",options:["学習データが少なすぎて学習できない状態","訓練データに過度に適合し、未知データへの汎化性能が低下した状態","モデルが複雑すぎて学習に時間がかかる状態","検証データのスコアが訓練データより高い状態"],correct:1,explanation:"過学習とは訓練データに過度に適合しすぎて、未見のデータに対する性能が低下する現象です。正則化やドロップアウトで防ぐことができます。"},
  {id:10,category:"機械学習",question:"強化学習においてエージェントが行動を選択する基準は何ですか？",options:["損失関数の最小化","累積報酬の最大化","エントロピーの最小化","データの再現率の最大化"],correct:1,explanation:"強化学習では、エージェントが環境と相互作用しながら累積報酬を最大化するように行動を学習します。"},
  {id:11,category:"機械学習",question:"ランダムフォレストの説明として正しいものはどれですか？",options:["1本の深い決定木を使う手法","複数の決定木を組み合わせるアンサンブル学習","ニューラルネットワークの一種","クラスタリング手法の一種"],correct:1,explanation:"ランダムフォレストは複数の決定木をランダムに生成して組み合わせるアンサンブル学習手法です。過学習に強く、精度が高い特徴があります。"},
  {id:12,category:"機械学習",question:"正則化の主な目的は何ですか？",options:["学習速度の向上","過学習の防止","特徴量の増加","バッチサイズの最適化"],correct:1,explanation:"正則化はモデルの複雑さにペナルティを与えることで過学習を防ぎ、汎化性能を向上させる手法です。L1正則化とL2正則化が代表的です。"},
  {id:13,category:"機械学習",question:"主成分分析（PCA）の主な用途として正しいものはどれですか？",options:["分類","次元削減","クラスタリング","回帰"],correct:1,explanation:"PCAは高次元データを低次元に圧縮する次元削減手法です。データの分散が最大となる方向（主成分）に射影します。"},
  {id:14,category:"機械学習",question:"交差検証（クロスバリデーション）の目的は何ですか？",options:["学習データを増やす","モデルの汎化性能を信頼性高く評価する","過学習を完全に防ぐ","特徴量を選択する"],correct:1,explanation:"交差検証はデータをk個に分割し、繰り返し訓練・評価することでモデルの汎化性能を信頼性高く評価する手法です。"},
  {id:15,category:"機械学習",question:"SVMのサポートベクターとは何ですか？",options:["全ての訓練データ点","決定境界に最も近いデータ点","外れ値のデータ点","テストデータ点"],correct:1,explanation:"サポートベクターは決定境界（超平面）に最も近いデータ点で、SVMはこの点との距離（マージン）を最大化するように学習します。"},

  // ディープラーニング
  {id:16,category:"ディープラーニング",question:"活性化関数を使う主な理由は何ですか？",options:["学習速度を上げるため","ネットワークに非線形性を導入するため","パラメータ数を減らすため","データを正規化するため"],correct:1,explanation:"活性化関数がなければニューラルネットワークは線形変換の繰り返しになり、表現力が制限されます。ReLUやSigmoidなどの非線形関数を使うことで複雑なパターンを学習できます。"},

// ===== STATE =====
let state = {
  mode: null,
  currentIndex: 0,
  answers: [],       // exam mode: {questionId, selected, correct}
  studyOrder: [],
  examOrder: [],
  timerInterval: null,
  timeLeft: 3600,
  examDone: false,
};

// ===== STORAGE =====
const STORAGE_KEY = 'g_kentei_progress';
const EXAM_COUNT_KEY = 'g_kentei_exams';

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveProgress(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function loadExamCount() {
  return parseInt(localStorage.getItem(EXAM_COUNT_KEY) || '0');
}
function saveExamCount(n) {
  localStorage.setItem(EXAM_COUNT_KEY, String(n));
}
function resetProgress() {
  if (!confirm('進捗データをリセットしますか？')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(EXAM_COUNT_KEY);
  renderProgress();
  updateHomeStats();
}

// ===== NAVIGATION =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  const tabs = document.querySelectorAll('.nav-tab');
  if (id === 'home') tabs[0].classList.add('active');
  if (id === 'progress') { tabs[1].classList.add('active'); renderProgress(); }
  if (id === 'result') { /* no tab */ }
}

// ===== HOME STATS =====
function updateHomeStats() {
  const prog = loadProgress();
  const ids = Object.keys(prog);
  const attempted = ids.length;
  let totalCorrect = 0, totalAttempts = 0;
  ids.forEach(id => {
    totalCorrect += prog[id].correct || 0;
    totalAttempts += (prog[id].correct || 0) + (prog[id].wrong || 0);
  });
  const rate = totalAttempts > 0 ? Math.round(totalCorrect / totalAttempts * 100) : 0;
  document.getElementById('stat-attempted').textContent = attempted;
  document.getElementById('stat-correct').textContent = rate + '%';
  document.getElementById('stat-exams').textContent = loadExamCount();
}

// ===== STUDY MODE =====
function startStudy() {
  state.mode = 'study';
  state.studyOrder = shuffle([...questions]);
  state.currentIndex = 0;
  showScreen('study');
  renderStudyQuestion();
}
function exitStudy() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  showScreen('home');
  updateHomeStats();
}
function renderStudyQuestion() {
  const q = state.studyOrder[state.currentIndex];
  const total = state.studyOrder.length;
  const pct = (state.currentIndex / total) * 100;
  document.getElementById('study-meta').textContent = `Q${state.currentIndex + 1} / ${total}`;
  document.getElementById('study-progress').style.width = pct + '%';
  const labels = ['A','B','C','D'];
  const html = `
    <div class="question-card fade-in">
      <div class="q-category">${q.category}</div>
      <div class="q-text">${q.question}</div>
      <div class="options" id="study-options">
        ${q.options.map((o, i) => `
          <button class="option-btn" id="study-opt-${i}" onclick="studyAnswer(${i})">
            <span class="opt-label">${labels[i]}</span>${o}
          </button>`).join('')}
      </div>
      <div id="study-explanation" style="display:none;"></div>
    </div>
    <div id="study-next-area"></div>
  `;
  document.getElementById('study-question-area').innerHTML = html;
}
function studyAnswer(selected) {
  const q = state.studyOrder[state.currentIndex];
  const isCorrect = selected === q.correct;
  const labels = ['A','B','C','D'];

  // Record progress
  const prog = loadProgress();
  if (!prog[q.id]) prog[q.id] = {correct:0, wrong:0};
  if (isCorrect) prog[q.id].correct++; else prog[q.id].wrong++;
  saveProgress(prog);

  // Update buttons
  q.options.forEach((_, i) => {
    const btn = document.getElementById('study-opt-' + i);
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === selected && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('neutral');
  });

  // Show explanation
  const expl = document.getElementById('study-explanation');
  expl.style.display = 'block';
  expl.innerHTML = `<div class="explanation-label">💡 解説</div>${q.explanation}`;
  expl.className = 'explanation-box fade-in';

  // Next button
  const isLast = state.currentIndex >= state.studyOrder.length - 1;
  document.getElementById('study-next-area').innerHTML = `
    <button class="next-btn fade-in" onclick="${isLast ? 'exitStudy()' : 'nextStudy()'}">
      ${isLast ? '🏠 ホームに戻る' : '次の問題へ →'}
    </button>`;
}
function nextStudy() {
  state.currentIndex++;
  renderStudyQuestion();
}

// ===== EXAM MODE =====
function startExam() {
  state.mode = 'exam';
  state.examOrder = shuffle([...questions]);
  state.currentIndex = 0;
  state.answers = [];
  state.timeLeft = 3600;
  state.examDone = false;
  showScreen('exam');
  startTimer();
  renderExamQuestion();
}
function startTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  updateTimerDisplay();
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    if (state.timeLeft <= 0) { clearInterval(state.timerInterval); finishExam(); }
  }, 1000);
}
function updateTimerDisplay() {
  const m = Math.floor(state.timeLeft / 60).toString().padStart(2,'0');
  const s = (state.timeLeft % 60).toString().padStart(2,'0');
  const el = document.getElementById('exam-timer');
  if (!el) return;
  el.textContent = `${m}:${s}`;
  el.className = 'timer' + (state.timeLeft < 300 ? ' danger' : state.timeLeft < 600 ? ' warning' : '');
}
function renderExamQuestion() {
  const q = state.examOrder[state.currentIndex];
  const total = state.examOrder.length;
  const pct = (state.currentIndex / total) * 100;
  document.getElementById('exam-meta').textContent = `Q${state.currentIndex + 1} / ${total}`;
  document.getElementById('exam-progress').style.width = pct + '%';
  const labels = ['A','B','C','D'];
  const html = `
    <div class="question-card fade-in">
      <div class="q-category">${q.category}</div>
      <div class="q-text">${q.question}</div>
      <div class="options">
        ${q.options.map((o, i) => `
          <button class="option-btn" onclick="examAnswer(${i})">
            <span class="opt-label">${labels[i]}</span>${o}
          </button>`).join('')}
      </div>
    </div>
  `;
  document.getElementById('exam-question-area').innerHTML = html;
}
function examAnswer(selected) {
  const q = state.examOrder[state.currentIndex];
  const isCorrect = selected === q.correct;
  state.answers.push({questionId: q.id, selected, correct: q.correct, isCorrect, category: q.category});

  // Record progress
  const prog = loadProgress();
  if (!prog[q.id]) prog[q.id] = {correct:0, wrong:0};
  if (isCorrect) prog[q.id].correct++; else prog[q.id].wrong++;
  saveProgress(prog);

  state.currentIndex++;
  if (state.currentIndex >= state.examOrder.length) {
    finishExam();
  } else {
    renderExamQuestion();
  }
}
function finishExam() {
  if (state.examDone) return;
  state.examDone = true;
  if (state.timerInterval) clearInterval(state.timerInterval);
  saveExamCount(loadExamCount() + 1);
  showScreen('result');
  renderResult();
}

// ===== RESULT =====
function renderResult() {
  const answers = state.answers;
  const total = state.examOrder.length;
  const answered = answers.length;
  const correct = answers.filter(a => a.isCorrect).length;
  const wrong = answered - correct;
  const skipped = total - answered;
  const score = Math.round(correct / total * 100);

  // Category breakdown
  const cats = {};
  state.examOrder.forEach(q => {
    if (!cats[q.category]) cats[q.category] = {total:0, correct:0};
    cats[q.category].total++;
  });
  answers.forEach(a => {
    if (a.isCorrect) cats[a.category].correct++;
  });

  const strokeColor = score >= 70 ? '#22c55e' : score >= 50 ? '#f59e0b' : '#ef4444';
  const circumference = 2 * Math.PI * 54;
  const offset = circumference * (1 - score / 100);
  const resultEmoji = score >= 70 ? '🎉' : score >= 50 ? '📚' : '💪';
  const resultMsg = score >= 70 ? '合格圏内！この調子で頑張ろう' : score >= 50 ? 'もう少し！苦手分野を復習しよう' : '基礎から復習しよう';

  const catHTML = Object.entries(cats).map(([name, data]) => {
    const r = data.total > 0 ? Math.round(data.correct / data.total * 100) : 0;
    const color = r >= 70 ? '#22c55e' : r >= 50 ? '#f59e0b' : '#ef4444';
    return `
      <div class="category-result">
        <div class="cat-header">
          <div class="cat-name">${name}</div>
          <div class="cat-score">${data.correct} / ${data.total} (${r}%)</div>
        </div>
        <div class="cat-bar"><div class="cat-bar-fill" style="width:${r}%;background:${color};"></div></div>
      </div>`;
  }).join('');

  document.getElementById('result-content').innerHTML = `
    <div class="result-hero fade-in">
      <div class="result-score-ring">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle class="ring-bg" cx="70" cy="70" r="54"/>
          <circle class="ring-fill" cx="70" cy="70" r="54"
            stroke="${strokeColor}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="result-score-num">${score}<span style="font-size:14px;color:var(--muted);">%</span></div>
      </div>
      <div class="result-title">${resultEmoji} ${resultMsg}</div>
      <div class="result-sub">時間: ${formatTime(3600 - state.timeLeft)} 経過</div>
    </div>

    <div class="result-stats fade-in">
      <div class="r-stat"><div class="r-stat-num green">${correct}</div><div class="r-stat-label">正解</div></div>
      <div class="r-stat"><div class="r-stat-num red">${wrong}</div><div class="r-stat-label">不正解</div></div>
      <div class="r-stat"><div class="r-stat-num accent">${skipped}</div><div class="r-stat-label">未回答</div></div>
    </div>

    <div class="section-title">カテゴリ別 正解率</div>
    ${catHTML}

    <div class="btn-row">
      <button class="btn-outline" onclick="startExam()">🔄 もう一度</button>
      <button class="btn-primary" onclick="showScreen('home');updateHomeStats()">🏠 ホームへ</button>
    </div>
  `;
}

// ===== PROGRESS =====
function renderProgress() {
  const prog = loadProgress();
  let totalCorrect = 0, totalWrong = 0;

  // Category stats
  const cats = {};
  questions.forEach(q => {
    if (!cats[q.category]) cats[q.category] = {total:0, correct:0, wrong:0};
    cats[q.category].total++;
    const p = prog[q.id];
    if (p) {
      cats[q.category].correct += p.correct || 0;
      cats[q.category].wrong += p.wrong || 0;
      totalCorrect += p.correct || 0;
      totalWrong += p.wrong || 0;
    }
  });

  const totalAttempts = totalCorrect + totalWrong;
  const overallRate = totalAttempts > 0 ? Math.round(totalCorrect / totalAttempts * 100) : 0;

  const catHTML = Object.entries(cats).map(([name, data]) => {
    const attempts = data.correct + data.wrong;
    const rate = attempts > 0 ? Math.round(data.correct / attempts * 100) : 0;
    const color = rate >= 70 ? '#22c55e' : rate >= 50 ? '#f59e0b' : '#ef4444';
    return `
      <div class="cat-progress-item">
        <div class="cat-p-header">
          <div class="cat-p-name">${name}</div>
          <div class="cat-p-nums">${data.correct}正解 / ${attempts}回答 (${rate}%)</div>
        </div>
        <div class="cat-p-bar"><div class="cat-p-fill" style="width:${rate}%;background:${color};"></div></div>
      </div>`;
  }).join('');

  document.getElementById('progress-content').innerHTML = `
    <div class="progress-overview fade-in">
      <div class="p-card">
        <div class="p-card-label">総合正解率</div>
        <div class="p-card-val accent">${overallRate}%</div>
      </div>
      <div class="p-card">
        <div class="p-card-label">総回答数</div>
        <div class="p-card-val green">${totalAttempts}</div>
      </div>
    </div>
    <div class="section-title">カテゴリ別 正解率</div>
    ${catHTML}
    <button class="reset-btn" onclick="resetProgress()">🗑️ 進捗をリセット</button>
  `;
}

// ===== UTILS =====
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}分${s}秒`;
}

// ===== INIT =====
updateHomeStats();
</script>
</body>
</html>
